  const[step,setStep]=useState("search"); // search | found | auto_results | manual
  const[itemName,setItemName]=useState("");   // USER's own name for the item (stays forever)
  const[matches,setMatches]=useState([]);
  const[selType,setSelType]=useState(null);   // catalog TAG selected by user
  const[expiryEnabled,setExpiryEnabled]=useState(false);
  const[warrantyEnabled,setWarrantyEnabled]=useState(false);
  const[expiryDate,setExpiryDate]=useState("");
  const[warrantyDate,setWarrantyDate]=useState("");
  const[note,setNote]=useState("");
  const[loading,setLoading]=useState(false);
  const[geminiLoading,setGeminiLoading]=useState(false);
  const[recommendations,setRecommendations]=useState([]);
  const[error,setError]=useState(null);

  // Live local fuzzy search while typing (instant, no network)
  function onNameChange(val){
    setItemName(val);
    const local=val.length>=1?searchItemTypes(val):[];
    setMatches(local);
    setSearchSource(local.length>0?"local":null);
  }

  const[searchSource,setSearchSource]=useState(null); // "gemini" | "local" | null
  async function handleSearch(){
    if(!itemName||itemName.length<1)return;
    setGeminiLoading(true);setError(null);
    const {results, source} = await geminiMatchItem(itemName);
    setMatches(results||[]);
    setSearchSource(source||null);
    setGeminiLoading(false);
    if(!results || results.length===0){
      setError(null); // no error — just show "browse manually" hint
    }
  }

  async function findAutoPlace(){
    setLoading(true);setError(null);
    try{
      const tok=await sb.validToken();
      const res=await fetch(SB_URL+"/functions/v1/find-shelf",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"x-user-token":tok},
        body:JSON.stringify({item_type_id:selType?.id||null,apartment_id:aptId})
      });
      const d=await res.json();
      if(!res.ok)throw new Error(d.error||"Search error");

      setRecommendations(d.recommendations||[]);
      setStep("auto_results");
    }catch(ex){setError(ex.message);}
    setLoading(false);
  }

  async function placeOnShelf(shelfId){
    setLoading(true);setError(null);
    try{
      const tok=await sb.validToken();
      const res=await fetch(SB_URL+"/functions/v1/place-item",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"x-user-token":tok},
        body:JSON.stringify({
          item_type_id:selType.id,
          shelf_id:shelfId,
          item_name:itemName||null,
          expiry_date:expiryEnabled&&expiryDate?expiryDate:null,
          warranty_date:warrantyEnabled&&warrantyDate?warrantyDate:null,
          note:note||null
        })
      });
      const d=await res.json();
      if(!res.ok)throw new Error(d.error||d.code||"Placement error");
      // Use furniture_id from server response (most reliable)
      const furnDbId=d.furniture_id||recommendations.find(r=>r.shelf.id===shelfId)?.furniture?.id||null;
      onItemPlaced&&onItemPlaced({shelfDbId:shelfId,furnDbId,itemType:selType,itemName,expiryDate:(expiryEnabled?expiryDate:null),warrantyDate:(warrantyEnabled?warrantyDate:null)});
      onClose();
    }catch(ex){setError(ex.message);}
    setLoading(false);
  }

  const LEVEL_LABELS={0:"👟 Floor",1:"🧥 Waist",2:"🎩 Head"};
  const SHELF_ICONS={shelf:"▬",drawer:"▭",hanger:"🪝",container:"📦",surface:"⬜",compartment:"🔲",rack:"🏗",hidden:"👁"};
  const ROOM_ICONS={kitchen:"🍳",bathroom:"🚿",bedroom:"🛏",living_room:"🛋",hallway:"🚪",office:"💻",storage:"📦"};

  return e(Modal,{title:"➕ Add Item",onClose,size:"md"},
    error&&e("div",{style:{background:"#fee2e2",color:"#dc2626",padding:"8px 12px",borderRadius:6,fontSize:12,marginBottom:8}},error),

    /* ── STEP: search ── */
    step==="search"&&e("div",{style:{display:"flex",flexDirection:"column",gap:14}},

      /* ── Назва предмета (власна, незмінна) ── */
      e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        e("label",{style:{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:.5}},
          "YOUR ITEM NAME"),
        e("div",{style:{display:"flex",gap:8}},
          e("input",{
            placeholder:"E.g. «Grandma's pot», «Green shampoo»...",
            maxLength:80,
            value:itemName, autoFocus:true,
            style:{flex:1,padding:"10px 12px",borderRadius:8,
              border:"2px solid var(--accent)",
              background:"var(--surface2)",color:"var(--text1)",
              fontFamily:"var(--font)",fontSize:14,fontWeight:600},
            onChange:ev=>onNameChange(ev.target.value.slice(0,80)),
            onKeyDown:ev=>ev.key==="Enter"&&handleSearch()
          }),
          e("button",{
            onClick:handleSearch,
            disabled:geminiLoading||itemName.length<1,
            title:"Gemini will suggest a category",
            style:{padding:"10px 14px",borderRadius:8,border:"none",cursor:"pointer",
              background:"var(--accent)",color:"white",fontSize:16}
          }, geminiLoading
            ?e("span",{style:{animation:"spin 1s linear infinite",display:"inline-block"}},"⟳")
            :"✨")
        ),
        e("div",{style:{fontSize:10,color:"var(--text3)"}},
          "This is your name — it will be saved as-is.")
      ),

      /* ── Підказки категорій від Gemini (теги) ── */
      (matches.length>0||geminiLoading)&&e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        e("div",{style:{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:.5,display:"flex",justifyContent:"space-between"}},
          "SIMILAR CATEGORIES",
          searchSource==="gemini"
            ?e("span",{style:{color:"#a78bfa",fontWeight:600}},"✨ Gemini")
            :e("span",{style:{color:"var(--text3)",fontWeight:400}},"🔍 local search")
        ),
        geminiLoading&&e("div",{style:{color:"var(--text3)",fontSize:12,padding:"8px 0"}},"✨ Gemini analyzing..."),
        !geminiLoading&&e("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
          matches.map(it=>{
            const isGemini=searchSource==="gemini";
            const isSel=selType?.id===it.id;
            return e("button",{key:it.id,
              onClick:()=>setSelType(isSel?null:it),
              style:{
                padding:"6px 12px",borderRadius:20,cursor:"pointer",
                fontFamily:"var(--font)",fontSize:12,fontWeight:600,
                border:"2px solid "+(isSel?"var(--accent)":isGemini?"#a78bfa66":"var(--border)"),
                background:isSel?"var(--accent)":isGemini?"#a78bfa12":"var(--surface2)",
                color:isSel?"white":isGemini?"#c4b5fd":"var(--text2)",
                boxShadow:isGemini&&!isSel?"0 0 8px #a78bfa30":"none",
                transition:"all .15s",display:"flex",alignItems:"center",gap:5
              }
            },
              e("span",null,isGemini?"✨":"🔍"),
              e("span",null,ROOM_ICONS[it.tags.room]||"📦"),
              e("span",null,it.name),
              isSel&&e("span",null,"✓")
            );
          })
        )
      ),
      /* ── Якщо Gemini/пошук не знайшли — вибір категорії вручну (ОБОВʼЯЗКОВО) ── */
      itemName.length>=1&&matches.length===0&&!geminiLoading&&e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        e("div",{style:{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:.5}},
          "NO CATEGORY FOUND — SELECT MANUALLY (ITEM CANNOT EXIST WITHOUT A TAG)"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflow:"auto",padding:6,
          border:"1px solid var(--border)",borderRadius:8,background:"var(--surface2)"}},
          // show first 60 options to pick from (you can refine by typing a clearer name)
          ITEM_TYPES.slice(0,60).map(it=>e("button",{key:it.id,
            onClick:()=>setSelType(it),
            style:{padding:"6px 10px",borderRadius:18,cursor:"pointer",
              fontFamily:"var(--font)",fontSize:12,fontWeight:600,
              border:"2px solid "+(selType?.id===it.id?"var(--accent)":"var(--border)"),
              background:selType?.id===it.id?"var(--accent)":"var(--surface3)",
              color:selType?.id===it.id?"white":"var(--text2)",
              transition:"all .15s",display:"flex",alignItems:"center",gap:6}
          },
            e("span",null,ROOM_ICONS[it.tags.room]||"📦"),
            e("span",null,it.name),
            selType?.id===it.id&&e("span",null,"✓")
          ))
        ),
        e("div",{style:{fontSize:10,color:"var(--text3)"}},
          "Tip: enter a more specific name — relevant categories will appear at the top.")
      ),

      /* ── Кнопка далі ── */
      itemName.length>=1&&e("button",{
        onClick:()=>{
          if(!selType){setError("No tag found/selected. Choose a category manually — an item cannot exist without a tag.");return;}
          setStep("found");
        },
        disabled:!selType,
        style:{padding:"11px",borderRadius:9,border:"none",
          cursor:selType?"pointer":"not-allowed",
          opacity:selType?1:0.55,
          background:"var(--accent)",color:"white",fontFamily:"var(--font)",
          fontWeight:700,fontSize:14,marginTop:4}
      }, selType?`Next — "${itemName}" (${selType.name}) →`:"Select a category (required) →")
    ),

    /* ── STEP: found — selected item + options ── */
    step==="found"&&selType&&e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
      /* Item name card — user's own name is primary */
      e("div",{style:{padding:"12px 16px",background:"var(--surface2)",borderRadius:10,
        border:"2px solid var(--accent)",display:"flex",flexDirection:"column",gap:6}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10}},
          e("span",{style:{fontSize:26}},selType?ROOM_ICONS[selType.tags.room]||"📦":"📦"),
          e("div",{style:{flex:1}},
            e("div",{style:{fontWeight:800,fontSize:16}},itemName||"(no name)"),
            selType
              ?e("div",{style:{marginTop:4,display:"flex",alignItems:"center",gap:6}},
                  e("span",{style:{fontSize:10,background:"var(--accent)20",color:"var(--accent)",
                    borderRadius:12,padding:"2px 8px",fontWeight:700}},"🏷 "+selType.name),
                  e("span",{style:{fontSize:10,color:"var(--text3)"}},
                    `${selType.tags.size} • ${selType.tags.room} • ${selType.tags.type}`)
                )
              :e("div",{style:{fontSize:11,color:"#f59e0b",marginTop:2}},
                  "⚠️ No category selected — placement search less accurate")
          ),
          e("button",{
            style:{fontSize:11,color:"var(--text3)",cursor:"pointer",background:"none",
              border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",flexShrink:0},
            onClick:()=>{setStep("search");}
          },"← back")
        )
      ),

      // Divider
      e("div",{style:{fontSize:11,color:"var(--text3)",fontWeight:700,letterSpacing:1}},
        "ADDITIONAL PARAMETERS"),

      // Expiry date
      e("div",{style:{background:"var(--surface2)",borderRadius:8,padding:"10px 12px",
        display:"flex",flexDirection:"column",gap:8}},
        e("label",{style:{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13}},
          e("input",{type:"checkbox",checked:expiryEnabled,
            style:{width:16,height:16,cursor:"pointer",accentColor:"var(--accent)"},
            onChange:ev=>setExpiryEnabled(ev.target.checked)}),
          e("span",null,"📅 Expiry date"),
          expiryEnabled&&e("span",{style:{fontSize:10,color:"#f59e0b",marginLeft:"auto"}},
            expiryDate?`${daysUntil(expiryDate)} days left`:"pick a date")
        ),
        expiryEnabled&&e("input",{type:"date",value:expiryDate,min:new Date().toISOString().split("T")[0],
          style:{padding:"8px 10px",borderRadius:7,border:"1px solid var(--border)",
            background:"var(--surface3)",color:"var(--text1)",fontFamily:"var(--font)",fontSize:13},
          onChange:ev=>setExpiryDate(ev.target.value)})
      ),

      // Warranty
      e("div",{style:{background:"var(--surface2)",borderRadius:8,padding:"10px 12px",
        display:"flex",flexDirection:"column",gap:8}},
        e("label",{style:{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13}},
          e("input",{type:"checkbox",checked:warrantyEnabled,
            style:{width:16,height:16,cursor:"pointer",accentColor:"var(--accent)"},
            onChange:ev=>setWarrantyEnabled(ev.target.checked)}),
          e("span",null,"🛡 Warranty"),
          warrantyEnabled&&e("span",{style:{fontSize:10,color:"#60a5fa",marginLeft:"auto"}},
            warrantyDate?`until ${warrantyDate}`:"pick a date")
        ),
        warrantyEnabled&&e("input",{type:"date",value:warrantyDate,min:new Date().toISOString().split("T")[0],
          style:{padding:"8px 10px",borderRadius:7,border:"1px solid var(--border)",
            background:"var(--surface3)",color:"var(--text1)",fontFamily:"var(--font)",fontSize:13},
          onChange:ev=>setWarrantyDate(ev.target.value)})
      ),

      // Note
      e("input",{placeholder:"✏️ Note (optional, e.g. «bought at IKEA»)",maxLength:120,value:note,
        style:{padding:"9px 12px",borderRadius:8,border:"1px solid var(--border)",
          background:"var(--surface2)",color:"var(--text1)",fontFamily:"var(--font)",fontSize:13},
        onChange:ev=>setNote(ev.target.value)}),

      // Action buttons
      e("div",{style:{display:"flex",gap:8}},
        e("button",{
          style:{flex:1,padding:"12px",borderRadius:9,border:"none",cursor:"pointer",
            background:"var(--accent)",color:"white",fontFamily:"var(--font)",fontWeight:700,fontSize:14},
          onClick:findAutoPlace,disabled:loading},
          loading?"⏳ Analyzing apartment...":"🔍 Find spot (auto)"
        ),
        e("button",{
          style:{flex:0,padding:"12px 16px",borderRadius:9,border:"1px solid var(--border)",cursor:"pointer",
            background:"var(--surface2)",color:"var(--text2)",fontFamily:"var(--font)",fontWeight:700,fontSize:14},
          onClick:()=>setStep("manual")},"🖱")
      )
    ),

    /* ── STEP: auto_results ── */
    step==="auto_results"&&e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      e("div",{style:{fontWeight:700,fontSize:13,marginBottom:4}},
        recommendations.length
          ?(()=>{
            const sameCount=recommendations.filter(r=>r.has_same_type).length;
            if(sameCount>0) return `📦 Found ${sameCount} shelf(ves) with this type + ${recommendations.length-sameCount} new spots:`;
            return `🏆 Top ${recommendations.length} spots for "${selType.name}":`;
          })()
          :"😔 No suitable spots found"
      ),
      (()=>{
        // Sort: same-type shelves first, then by score
        const sorted=[...recommendations].sort((a,b)=>{
          if(a.has_same_type&&!b.has_same_type) return -1;
          if(!a.has_same_type&&b.has_same_type) return 1;
          return b.score-a.score;
        });
        return sorted.map((rec,i)=>{
          const isSameType=rec.has_same_type;
          const scoreColor=rec.score>=150?"#22c55e":rec.score>=120?"#f59e0b":"#94a3b8";
          const furnLabel=furnDef(rec.furniture.type)?.label||rec.furniture.type;
          return e("button",{key:i,
            style:{
              padding:"12px 14px",borderRadius:9,textAlign:"left",
              width:"100%",fontFamily:"var(--font)",transition:"all .15s",
              cursor:"pointer",
              border: isSameType ? "2px solid #22c55e" : i===0 ? "2px solid var(--accent)" : "2px solid var(--border)",
              background: isSameType ? "#22c55e12" : i===0 ? "var(--accent)0a" : "var(--surface2)",
              boxShadow: isSameType ? "0 0 0 1px #22c55e30, 0 2px 12px #22c55e18" : "none",
            },
            onClick:()=>placeOnShelf(rec.shelf.id),
            disabled:loading
          },
            isSameType&&e("div",{style:{
              display:"flex",alignItems:"center",gap:5,
              marginBottom:6,
              fontSize:11,fontWeight:700,color:"#22c55e",
              background:"#22c55e18",borderRadius:5,padding:"3px 8px",
              width:"fit-content"
            }},
              "📦 Already has this type · "+rec.existing_count+" pcs"
            ),
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
              e("span",{style:{fontWeight:700,fontSize:13}},
                `${SHELF_ICONS[rec.shelf.shelf_type]||"▬"} ${furnLabel} — ${LEVEL_LABELS[rec.furniture.z??rec.shelf.level]||"?"}`
              ),
              e("span",{style:{fontWeight:800,fontSize:15,color:isSameType?"#22c55e":scoreColor}},
                isSameType?"🟢":Math.round(rec.score))
            ),
            e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              rec.reasons.slice(0,4).map((r,ri)=>e("span",{key:ri,
                style:{fontSize:10,padding:"2px 6px",borderRadius:4,
                  background:r.startsWith("✅")?"#22c55e18":r.startsWith("⚠️")?"#f59e0b18":"#ef444418",
                  color:r.startsWith("✅")?"#22c55e":r.startsWith("⚠️")?"#f59e0b":"#ef4444"
                }},r))
            )
          );
        });
      })(),
      loading&&e("div",{style:{textAlign:"center",color:"var(--text3)",padding:12}},"⏳ Placing..."),
      e("div",{style:{display:"flex",gap:8,marginTop:4}},
        e("button",{
          style:{padding:"8px 14px",borderRadius:7,border:"1px solid var(--border)",cursor:"pointer",
            background:"var(--surface2)",color:"var(--text2)",fontFamily:"var(--font)",fontSize:12},
          onClick:()=>setStep("found")},"← Back"),
        e("button",{
          style:{padding:"8px 14px",borderRadius:7,border:"1px solid var(--border)",cursor:"pointer",
            background:"var(--surface2)",color:"var(--text2)",fontFamily:"var(--font)",fontSize:12},
          onClick:()=>setStep("manual")},"🖱 Choose manually")
      )
    ),

    /* ── STEP: manual ── */
    step==="manual"&&e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
      e("div",{style:{padding:"14px",background:"var(--surface2)",borderRadius:10,
        fontSize:13,color:"var(--text2)",lineHeight:1.7}},
        e("div",{style:{fontWeight:700,marginBottom:6}},`📦 Placing "${selType?.name||"item"}"`),
        "1. Close this window\n",
        "2. Go to the right room\n",
        "3. Click on the furniture\n",
        "4. Click on the desired shelf\n",
        "5. The selected shelf will highlight — click \"Place here\""
      ),
      e("button",{
        style:{padding:"12px",borderRadius:9,border:"none",cursor:"pointer",
          background:"var(--accent)",color:"white",fontFamily:"var(--font)",fontWeight:700,fontSize:14},
        onClick:onClose},"Got it →")
    )
  );
}

/* ─── SearchBar ─── */
function SearchBar({aptId,onHighlight}){
  const[q,setQ]=useState("");
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[open,setOpen]=useState(false);

  async function doSearch(){
    if(!q||q.length<2)return;
    setLoading(true);
    try{
      const tok=await sb.validToken();
      const res=await fetch(SB_URL+"/functions/v1/search-item",{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"x-user-token":tok},
        body:JSON.stringify({query:q,apartment_id:aptId})
      });
      const d=await res.json();
      setResults(d.results||[]);setOpen(true);
    }catch(ex){setResults([]);}
    setLoading(false);
  }

  const ROOM_LABELS={kitchen:"🍳 Kitchen",bathroom:"🚿 Bathroom",bedroom:"🛏 Bedroom",living_room:"🛋 Living Room",hallway:"🚪 Hallway",office:"💻 Office",storage:"📦 Storage"};

  return e("div",{style:{position:"relative",flex:1}},
    e("div",{style:{display:"flex",gap:6}},
      e("input",{
        placeholder:"🔍 Find item...",maxLength:60,value:q,
        style:{flex:1,padding:"7px 12px",borderRadius:8,border:"1px solid var(--border)",
          background:"var(--surface2)",color:"var(--text1)",fontFamily:"var(--font)",fontSize:13},
        onChange:ev=>setQ(ev.target.value),
        onKeyDown:ev=>ev.key==="Enter"&&doSearch()
      }),
      e("button",{className:"btn sm",onClick:doSearch,disabled:loading},loading?"...":"Search")
    ),
    open&&results&&e("div",{style:{
      position:"absolute",top:"100%",left:0,right:0,marginTop:4,
      background:"var(--surface1)",border:"1px solid var(--border)",
      borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.3)",zIndex:200,
      maxHeight:320,overflowY:"auto"
    }},
      e("div",{style:{display:"flex",justifyContent:"space-between",padding:"8px 12px",
        borderBottom:"1px solid var(--border)"}},
        e("span",{style:{fontSize:12,color:"var(--text3)"}},`Found: ${results.length}`),
        e("button",{style:{fontSize:11,cursor:"pointer",background:"none",border:"none",color:"var(--text3)"},
          onClick:()=>setOpen(false)},"✕")
      ),
      results.length===0&&e("div",{style:{padding:16,textAlign:"center",fontSize:13,color:"var(--text3)"}},
        "Nothing found"),
      results.map((r,i)=>e("div",{key:i,
        style:{padding:"10px 12px",borderBottom:"1px solid var(--border)",cursor:"pointer",
          background:"transparent"},
        onClick:()=>{onHighlight&&onHighlight(r);setOpen(false);}
      },
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{display:"flex",flexDirection:"column",gap:2}},
            e("span",{style:{fontWeight:700,fontSize:13}},
              r.item_name||r.item_type?.name||"?"),
            r.item_name&&r.item_type&&e("span",{style:{fontSize:10,color:"var(--text3)"}},
              "🏷 "+r.item_type.name)
          ),
          r.placed
            ?e("span",{style:{fontSize:10,color:"#22c55e",background:"#22c55e18",
                borderRadius:4,padding:"2px 6px",flexShrink:0}},"✓ placed")
            :e("span",{style:{fontSize:10,color:"var(--text3)",background:"var(--surface2)",
                borderRadius:4,padding:"2px 6px",flexShrink:0}},"not placed")
        ),
        r.location&&e("div",{style:{fontSize:11,color:"var(--text3)",marginTop:2}},
          `${ROOM_LABELS[r.location.room_type]||r.location.room_type} → ${r.location.furniture_type}`),
        r.expiry_date&&e("div",{style:{fontSize:10,marginTop:2,
          color:daysUntil(r.expiry_date)<=2?"#ef4444":"#f59e0b"}},
          `📅 until ${r.expiry_date}${daysUntil(r.expiry_date)<=0?" ❗EXPIRED":daysUntil(r.expiry_date)<=7?" ⚠️ soon":""}`
        )
      ))
    )
  );
}


/* ─── NotificationBanner — two separate panels: food expiry + warranty ─── */
function NotificationBanner({userId}){
  const STORE_EXPIRY="apt_dismissed_expiry";
  const STORE_WARRANTY="apt_dismissed_warranty";

  // Load dismissed IDs from localStorage — persists across sessions
  const loadDismissed=key=>{
    try{return new Set(JSON.parse(localStorage.getItem(key)||"[]"));}
    catch{return new Set();}
  };
  const saveDismissed=(key,set)=>{
    try{localStorage.setItem(key,JSON.stringify([...set]));}catch{}
  };

  const[expiryItems,setExpiryItems]=useState([]);
  const[warrantyItems,setWarrantyItems]=useState([]);
  const[dismissedExpiry,setDismissedExpiry]=useState(()=>loadDismissed(STORE_EXPIRY));
  const[dismissedWarranty,setDismissedWarranty]=useState(()=>loadDismissed(STORE_WARRANTY));

  useEffect(()=>{
    if(!userId)return;
    sb.q("user_items?user_id=eq."+userId+"&expiry_date=not.is.null&select=id,expiry_date,item_name,item_type_id,items:item_type_id(name)")
      .then(data=>{
        if(!data)return;
        setExpiryItems(data.filter(d=>daysUntil(d.expiry_date)<=30));
      }).catch(()=>{});
    sb.q("user_items?user_id=eq."+userId+"&warranty_date=not.is.null&select=id,warranty_date,item_name,item_type_id,items:item_type_id(name)")
      .then(data=>{
        if(!data)return;
        setWarrantyItems(data.filter(d=>daysUntil(d.warranty_date)<=30));
      }).catch(()=>{});
  },[userId]);

  // Dismiss all currently visible item IDs for this banner type
  const dismissAll=(items,storeKey,setter)=>{
    const newSet=new Set(items.map(a=>a.id));
    saveDismissed(storeKey,newSet);
    setter(newSet);
  };

  // Only show items that haven't been dismissed
  const visible=(items,dismissed)=>items.filter(a=>!dismissed.has(a.id));

  const expiredFood=visible(expiryItems.filter(a=>daysUntil(a.expiry_date)<=0), dismissedExpiry);
  const soonFood=visible(expiryItems.filter(a=>daysUntil(a.expiry_date)>0), dismissedExpiry);
  const expiredWarranty=visible(warrantyItems.filter(a=>daysUntil(a.warranty_date)<=0), dismissedWarranty);
  const soonWarranty=visible(warrantyItems.filter(a=>daysUntil(a.warranty_date)>0), dismissedWarranty);

  const itemLabel=a=>a.item_name||(a.items?.name)||"?";

  const BannerPanel=({allItems,onDismiss,color,borderColor,titleColor,icon,title,expired,soon,dateKey})=>{
    if(!expired.length&&!soon.length)return null;
    return e("div",{style:{
      padding:"12px 16px",borderRadius:10,marginBottom:8,
      background:color,border:"1.5px solid "+borderColor,
      fontSize:13,display:"flex",flexDirection:"column",gap:6
    }},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}},
        e("div",{style:{display:"flex",flexDirection:"column",gap:4,flex:1}},
          e("div",{style:{fontWeight:800,fontSize:12,color:titleColor,letterSpacing:.5}},icon+" "+title),
          expired.length>0&&e("div",{style:{fontWeight:700,color:"#dc2626",fontSize:13}},
            "❗ Expired: "+expired.map(itemLabel).join(", ")
          ),
          soon.length>0&&e("div",{style:{color:"#92400e",fontSize:12}},
            "⏳ "+soon.map(a=>{
              const d=daysUntil(a[dateKey]);
              return itemLabel(a)+(d<=7?` (${d}d ⚠️)`:` (${d}d)`);
            }).join(" · ")
          )
        ),
        e("button",{
          onClick:onDismiss,
          title:"Dismiss — won't show again until new items appear",
          style:{background:"none",border:"1px solid "+borderColor,borderRadius:6,
            padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",
            color:titleColor,flexShrink:0,alignSelf:"flex-start"}
        },"OK ✓")
      )
    );
  };

  return e("div",null,
    e(BannerPanel,{
      allItems:expiryItems,
      onDismiss:()=>dismissAll([...expiredFood,...soonFood],STORE_EXPIRY,setDismissedExpiry),
      color:expiredFood.length?"#fee2e2":"#fef3c7",
      borderColor:expiredFood.length?"#fca5a5":"#fcd34d",
      titleColor:expiredFood.length?"#dc2626":"#92400e",
      icon:"🥫", title:"FOOD & EXPIRY",
      expired:expiredFood, soon:soonFood, dateKey:"expiry_date"
    }),
    e(BannerPanel,{
      allItems:warrantyItems,
      onDismiss:()=>dismissAll([...expiredWarranty,...soonWarranty],STORE_WARRANTY,setDismissedWarranty),
      color:expiredWarranty.length?"#f5e6ff":"#ede9fe",
      borderColor:expiredWarranty.length?"#c084fc":"#a78bfa",
      titleColor:expiredWarranty.length?"#7c3aed":"#6d28d9",
      icon:"🛡", title:"WARRANTY",
      expired:expiredWarranty, soon:soonWarranty, dateKey:"warranty_date"
    })
  );
}

/* ─── APP ─── */
/*
  ID strategy:
  - Client generates UUID localId for React keys and state management
  - DB uses bigint GENERATED ALWAYS — we never send these to the DB on insert
  - After save, server returns idMap {localId -> dbId} and we persist dbId
  - On subsequent saves we send dbId so server does UPDATE not INSERT
*/
/* ─── Dev: insert test items using real shelf IDs ─── */
async function runTestNotifications(aptId){
  const tok=sb.getToken();
  if(!tok){alert("Not logged in");return;}
  const payload=JSON.parse(atob(tok.split(".")[1]));
  const userId=payload.sub;
  if(!userId){alert("Cannot determine user ID");return;}
  if(!aptId){alert("No apartment selected. Select or save an apartment first.");return;}

  // Fetch shelves that belong to THIS apartment only
  // apartments → rooms → furniture → shelves
  const rooms=await sb.q("rooms?apartment_id=eq."+aptId+"&select=id").catch(()=>[]);
  if(!rooms||!rooms.length){alert("No rooms in this apartment. Add some rooms and save first.");return;}
  const roomIds=rooms.map(r=>r.id);

  const furns=await sb.q("furniture?room_id=in.("+roomIds.join(",")+")"+"&select=id").catch(()=>[]);
  if(!furns||!furns.length){alert("No furniture in this apartment. Add furniture and save first.");return;}
  const furnIds=furns.map(f=>f.id);

  const shelves=await sb.q("shelves?furniture_id=in.("+furnIds.join(",")+")"+"&select=id").catch(()=>[]);
  if(!shelves||!shelves.length){
    alert("No shelves found. Open storage furniture and add shelf rows, then save.")
    return;
  }

  const sid=s=>shelves[s%shelves.length].id;
  const d=(n)=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};

  const testItems=[
    {user_id:userId,shelf_id:sid(0),item_type_id:47,item_name:"🧪 Snack — EXPIRED",          expiry_date:d(-2)},
    {user_id:userId,shelf_id:sid(1),item_type_id:48,item_name:"🧪 Bread — expires TODAY",     expiry_date:d(0)},
    {user_id:userId,shelf_id:sid(2),item_type_id:12,item_name:"🧪 Pasta — 3 days",            expiry_date:d(3)},
    {user_id:userId,shelf_id:sid(3),item_type_id:16,item_name:"🧪 Coffee — 10 days",          expiry_date:d(10)},
    {user_id:userId,shelf_id:sid(4),item_type_id:15,item_name:"🧪 Oil — 25 days",             expiry_date:d(25)},
    {user_id:userId,shelf_id:sid(0),item_type_id:33,item_name:"🧪 Laptop — WARRANTY EXPIRED", warranty_date:d(-1)},
    {user_id:userId,shelf_id:sid(1),item_type_id:20,item_name:"🧪 Appliance — warranty 5d",   warranty_date:d(5)},
    {user_id:userId,shelf_id:sid(2),item_type_id:21,item_name:"🧪 Hairdryer — warranty 20d",  warranty_date:d(20)},
  ];

  let ok=0,fail=0;
  for(const item of testItems){
    try{await sb.q("user_items","POST",item);ok++;}catch(ex){fail++;}
  }

  alert(`✅ Inserted ${ok} test items on ${shelves.length} shelf(ves) from your apartment.

Refresh the page to see banners.

To clean up: delete items with name starting "🧪" from Supabase.`);
}

function App(){
  const[session,setSession]=useState(()=>(localStorage.getItem("sb_t")||localStorage.getItem("sb_r"))?{token:1}:null);
  const[apts,setApts]=useState([]);
  // aptId here is the DB bigint id (or null if not yet saved)
  const[aptId,setAptId]=useState(null);
  const[aptLocalName,setAptLocalName]=useState("");
  const[rooms,setRooms]=useState([]);
  // furniture: { roomLocalId -> [furnObj] }
  // furnObj has: localId (uuid), dbId (bigint|null), roomLocalId, roomDbId(null until saved)
  const[furniture,setFurniture]=useState({});
  const[activeRoom,setActiveRoom]=useState(null); // localId
  const[selFurnId,setSelFurnId]=useState(null);   // localId
  const[highlightFurnDbId,setHighlightFurnDbId]=useState(null); // after place-item, highlight furniture
  const[highlightShelfDbId,setHighlightShelfDbId]=useState(null); // highlight specific shelf
  const[roomSizes,setRoomSizes]=useState({});
  const[modal,setModal]=useState(null);
  const[saveStatus,setSaveStatus]=useState("idle");
  const[dirty,setDirty]=useState(false);

  // Load item types from DB once after login
  useEffect(()=>{
    if(!session)return;
    sb.q("items?select=id,name,tags&order=id.asc").then(rows=>{
      if(rows&&rows.length){
        ITEM_TYPES=rows.map(r=>({id:r.id, name:r.name, tags:r.tags||{}}));
        console.log("[items] loaded "+ITEM_TYPES.length+" types from DB");
      }
    }).catch(e=>console.warn("[items] failed to load:",e));
  },[session]);

  // Load apartments list from DB
  useEffect(()=>{
    if(!session)return;
    sb.q("apartments?select=*&order=created_at.desc&user_id=eq."+getUserId()).then(d=>{
      setApts(d||[]);
      if(d&&d.length){loadApt(d[0]);}
    }).catch(()=>{
      // Try without user_id filter if RLS handles it
      sb.q("apartments?select=*&order=created_at.desc").then(d=>{
        setApts(d||[]);
        if(d&&d.length)loadApt(d[0]);
      }).catch(()=>{});
    });
  },[session]);

  function getUserId(){
    try{const t=sb.getToken();if(!t)return"";const p=JSON.parse(atob(t.split(".")[1]));return p.sub||"";}catch{return"";}
  }

  function loadApt(apt){
    setAptId(apt.id);
    setAptLocalName(apt.name||"");
    setSelFurnId(null);setActiveRoom(null);setFurniture({});setRoomSizes({});setRooms([]);
    sb.q("rooms?apartment_id=eq."+apt.id+"&select=*").then(async rs=>{
      const rl=rs||[];
      // Map DB rooms to local format (localId = uid, dbId = db bigint)
      const localRooms=rl.map(r=>({...r,localId:uid(),dbId:r.id,type:r.type}));
      setRooms(localRooms);
      if(!localRooms.length)return;
      setActiveRoom(localRooms[0].localId);
      const rids=rl.map(r=>r.id).join(",");
      const fs=await sb.q("furniture?room_id=in.("+rids+")&select=*").catch(()=>[]);
      const byRoom={};
      localRooms.forEach(r=>{byRoom[r.localId]=[];});

      // Load room sizes if columns exist
      const sizeMap={};
      localRooms.forEach(r=>{
        if(r.width&&r.height)sizeMap[r.localId]={w:r.width,h:r.height};
      });
      setRoomSizes(sizeMap);

      // Load shelves for all furniture
      const furnIds=(fs||[]).map(f=>f.id).filter(Boolean);
      let allShelves=[];
      if(furnIds.length>0){
        allShelves=await sb.q("shelves?furniture_id=in.("+furnIds.join(",")+")&select=*&order=level.asc").catch(()=>[]);
      }

      // Load user_items — single source of truth for placed items
      // user_items has: shelf_id, item_type_id, item_name, id, expiry_date
      const shelfIds=(allShelves||[]).map(s=>s.id).filter(Boolean);
      let placedMap={}; // shelfDbId -> {item_type_id, count, items:[]}
      if(shelfIds.length>0){
        const userToken=await sb.validToken().catch(()=>null);
        const placed=await sb.q(
          "user_items?shelf_id=in.("+shelfIds.join(",")+")&select=id,shelf_id,item_type_id,item_name,expiry_date"
        ).catch(()=>[]);
        (placed||[]).forEach(p=>{
          if(!p.shelf_id)return; // skip unplaced
          if(!placedMap[p.shelf_id]) placedMap[p.shelf_id]={item_type_id:p.item_type_id,count:0,items:[]};
          placedMap[p.shelf_id].count++;
          placedMap[p.shelf_id].items.push({id:p.id,name:p.item_name,expiry:p.expiry_date});
        });
      }

      (fs||[]).forEach(f=>{
        const parentRoom=localRooms.find(r=>r.dbId===f.room_id);
        if(!parentRoom)return;

        // Rebuild shelfGrid from flat shelves rows
        const furnShelves=(allShelves||[]).filter(s=>s.furniture_id===f.id);
        let shelfGrid=null;
        if(furnShelves.length>0){
          // Group by level (row), sort by position (col)
          const rows={};
          furnShelves.forEach(s=>{
            const row=s.level||0;
            const col=s.position||0;
            if(!rows[row])rows[row]=[];
            // itemId: first check placed_items (source of truth), fallback shelves.item_type_id
            const pm=placedMap[s.id];
            const itemId=pm?.item_type_id||s.item_type_id||null;
            const itemCount=pm?.count||0;
            rows[row][col]={
              id:uid(),
              shelfDbId:s.id,
              shelfType:s.shelf_type||"shelf",
              size:s.size_class||"medium",
              flex:s.flex||1,
              itemId,
              itemCount,
              items: pm?.items||[]  // actual placed user_items with names
            };
          });
          shelfGrid=Object.keys(rows).sort((a,b)=>+a-+b).map(ri=>
            (rows[ri]||[]).filter(Boolean)
          ).filter(row=>row.length>0);
        }

        const fw=f.width||80, fh=f.height||60, frot=f.rotation||0;
        const fdispW=(frot===90||frot===270)?fh:fw;
        const fdispH=(frot===90||frot===270)?fw:fh;
        // Convert stored top-left x,y → center cx,cy
        const fcx=(f.x||80)+fw/2, fcy=(f.y||80)+fh/2;
        byRoom[parentRoom.localId].push({
          localId:uid(),dbId:f.id,
          roomLocalId:parentRoom.localId,roomDbId:f.room_id,
          type:f.type,x:fcx,y:fcy,
          w:fw,h:fh,
          z:f.z||0,rotation:frot,
          category:f.category||"storage",
          shelfGrid
        });
      });
      setFurniture(byRoom);
    }).catch(()=>{});
  }

  async function manualSave(){
    if(!dirty&&aptId)return; // nothing changed
    setSaveStatus("saving");
    try{
      const userToken=await sb.validToken();
      if(!userToken){setSaveStatus("errr");return;}

      const allF=Object.entries(furniture).flatMap(([roomLocalId,farr])=>
        farr.map(f=>({
          localId:f.localId, dbId:f.dbId||null,
          roomLocalId, roomDbId:f.roomDbId||null,
          type:f.type, x:f.x-f.w/2, y:f.y-f.h/2, z:f.z||0,
          width:f.w, height:f.h,
          rotation:f.rotation||0,
          category:f.category||"storage",
          // Convert shelfGrid -> shelves array for server
          shelves:(f.shelfGrid||[]).flatMap((row,ri)=>
            row.map((cell,ci)=>({
              localId:cell.id,
              level:f.z||0,
              position:ci,
              shelf_type:cell.shelfType||"shelf",
              size_class:cell.size||"medium",
              flex:cell.flex||1,
              item_type_id:cell.itemId||null,
              allowed_types:cell.itemId?[cell.itemId]:null
            }))
          )
        }))
      );

      const roomsPayload=rooms.map(r=>({
        localId:r.localId, dbId:r.dbId||null, type:r.type,
        // room sizes stored as extra fields (need columns in DB or store client-side)
        width:roomSizes[r.localId]?.w||null,
        height:roomSizes[r.localId]?.h||null,
      }));

      const res=await fetch(SB_URL+"/functions/v1/save-layout",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "apikey":SB_KEY,
          "Authorization":"Bearer "+SB_KEY,
          "x-user-token":userToken
        },
        body:JSON.stringify({
          apartment:{dbId:aptId||null, name:aptLocalName},
          rooms:roomsPayload,
          furniture:allF
        })
      });
      const data=await res.json();
      if(!res.ok)throw new Error(JSON.stringify(data));

      // Update local state with server-assigned dbIds
      const{aptDbId, idMap}=data;
      if(aptDbId&&!aptId)setAptId(aptDbId);

      // Update rooms with their new dbIds
      setRooms(prev=>prev.map(r=>({
        ...r,
        dbId:idMap[r.localId]||r.dbId||null
      })));

      // Update furniture with new dbIds and correct roomDbIds
      setFurniture(prev=>{
        const next={};
        Object.entries(prev).forEach(([roomLocalId,farr])=>{
          next[roomLocalId]=farr.map(f=>({
            ...f,
            dbId:idMap[f.localId]||f.dbId||null,
            roomDbId:idMap[roomLocalId]||f.roomDbId||null
          }));
        });
        return next;
      });

      // Refresh apartments list — replace local _local entry with real DB record
      if(aptDbId){
        setApts(prev=>{
          // Remove any local placeholder with same name, update existing DB record, or prepend new
          const withoutLocal=prev.filter(a=>!(a._local&&a.name===aptLocalName)&&a.id!==null);
          const exists=withoutLocal.find(a=>a.id===aptDbId);
          if(exists)return withoutLocal.map(a=>a.id===aptDbId?{...a,name:aptLocalName}:a);
          return [{id:aptDbId,name:aptLocalName,created_at:new Date().toISOString()},...withoutLocal];
        });
      }

      setSaveStatus("saved");setDirty(false);
    }catch(ex){console.error(ex);setSaveStatus("errr");}
  }

  function setR(fn){setRooms(p=>{const n=typeof fn==="function"?fn(p):fn;setDirty(true);return n;});}
  function setF(fn){setFurniture(p=>{const n=typeof fn==="function"?fn(p):fn;setDirty(true);return n;});}

  function createApt(name){
    const trimmed=name.trim().slice(0,40);
    if(!trimmed){alert("Apartment name cannot be empty.");return;}
    if(apts.some(a=>a.name?.toLowerCase()===trimmed.toLowerCase())){
      alert("An apartment with this name already exists. Choose a different name.");return;
    }
    const localApt={id:null,name:trimmed,created_at:new Date().toISOString(),_local:true};
    setApts(p=>[localApt,...p]);
    setAptId(null);setAptLocalName(trimmed);
    setRooms([]);setFurniture({});setActiveRoom(null);setRoomSizes({});
    setDirty(true);
  }
  async function deleteApt(){
    if(!aptId&&!aptLocalName){return;}
    const name=aptLocalName||"this apartment";
    const ok=window.confirm("Delete \""+name+"\" and ALL its rooms, furniture, shelves and items? This cannot be undone.");
    if(!ok)return;
    if(aptId){
      await sb.q("apartments?id=eq."+aptId,"DELETE").catch(()=>{});
    }
    // Reset local state — activeRoom first to prevent RoomCanvas crash
    setActiveRoom(null);
    setSelFurnId(null);
    setAptId(null);
    setAptLocalName("");
    setRooms([]);
    setFurniture({});
    setRoomSizes({});
    setDirty(false);
    setSaveStatus("idle");
    // Remove from selector list, then auto-load next apartment if any
    setApts(p=>{
      const remaining=p.filter(a=>a.id!==aptId&&!(a._local&&a.name===aptLocalName));
      if(remaining.length>0&&remaining[0].id){
        setTimeout(()=>loadApt(remaining[0]),0);
      }
      return remaining;
    });
  }

  function addRoom(type){
    const r={localId:uid(),dbId:null,type};
    setR(p=>[...p,r]);
    setFurniture(p=>({...p,[r.localId]:[]}));
    setActiveRoom(r.localId);
  }
  async function deleteRoom(localId){
    const room=rooms.find(r=>r.localId===localId);
    if(room?.dbId){
      const ok=window.confirm("Delete this room and all its furniture from the database?");
      if(!ok)return;
      await sb.q("rooms?id=eq."+room.dbId,"DELETE").catch(()=>{});
    }
    setR(p=>p.filter(r=>r.localId!==localId));
    setFurniture(p=>{const n={...p};delete n[localId];return n;});
    if(activeRoom===localId){const next=rooms.find(r=>r.localId!==localId);setActiveRoom(next?next.localId:null);}
  }
  function addFurn(f){
    if(!activeRoom)return;
    const furn={...f,localId:uid(),dbId:null,roomLocalId:activeRoom,roomDbId:null};
    setF(p=>({...p,[activeRoom]:[...(p[activeRoom]||[]),furn]}));
    setSelFurnId(furn.localId);
  }
  function updateFurn(f){
    const rId=f.roomLocalId||activeRoom;
    setF(p=>({...p,[rId]:(p[rId]||[]).map(x=>x.localId===f.localId?f:x)}));
  }
  function deleteFurn(localId){
    if(!activeRoom)return;
    setF(p=>({...p,[activeRoom]:(p[activeRoom]||[]).filter(f=>f.localId!==localId)}));
    setSelFurnId(null);
  }
  function logout(){sb.clearSession();setSession(null);}
  const userId=getUserId();

  if(!session)return e(AuthScreen,{onAuth:setSession});

  const activeRoomData=rooms.find(r=>r.localId===activeRoom);
  const roomFurn=(activeRoom&&furniture[activeRoom])||[];
  const selFurn=roomFurn.find(f=>f.localId===selFurnId)||null;
  const rc=activeRoomData?ROOM_COLORS[activeRoomData.type]||"#94a3b8":"#6366f1";
  const constructorFurn=modal&&modal.type==="constr"?modal.furn:null;

  return e("div",{id:"app"},
    /* TOPBAR */
    e("div",{className:"topbar"},
      e("div",{className:"logo"},"ApartmentOS"),
      e("select",{className:"apt-sel",value:aptId!=null?String(aptId):"",onChange:x=>{const apt=apts.find(a=>String(a.id)===x.target.value);if(apt)loadApt(apt);}},
        apts.length===0&&e("option",{value:""},"— no apartments —"),
        apts.map(a=>e("option",{key:a.id||a.name,value:a.id||""},a.name+(a._local?" *":"")))
      ),
      e("button",{className:"btn sm",onClick:()=>setModal("apt")},"+ Apartment"),
      (aptId||aptLocalName)&&e("button",{
        className:"btn sm",
        onClick:deleteApt,
        title:"Delete this apartment and all its data",
        style:{background:"#ef444420",borderColor:"#ef4444",color:"#ef4444",padding:"4px 8px",fontSize:11}
      },"🗑"),
      e("div",{className:"spacer"}),
      dirty&&e("span",{style:{fontSize:11,color:"#f59e0b",fontFamily:"var(--mono)"}},"● unsaved"),
      saveStatus==="saving"&&e("span",{style:{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}},"saving..."),
      saveStatus==="saved"&&!dirty&&e("span",{style:{fontSize:11,color:"var(--success)",fontFamily:"var(--mono)"}},"✓ saved"),
      saveStatus==="errr"&&e("span",{style:{fontSize:11,color:"var(--danger)",fontFamily:"var(--mono)"}},"✕ save error"),
      e("button",{className:"btn sm",onClick:manualSave,disabled:saveStatus==="saving"||(!aptId&&!aptLocalName),
        title:(!aptId&&!aptLocalName)?"Create an apartment first":"Save layout",
        style:{
          background:dirty&&(aptId||aptLocalName)?"var(--accent)":"var(--surface2)",
          borderColor:dirty&&(aptId||aptLocalName)?"var(--accent)":"var(--border)",
          color:dirty&&(aptId||aptLocalName)?"white":"var(--text3)"
        }},
        saveStatus==="saving"?"...":"💾 Save"),
      e("button",{className:"btn sec sm",onClick:logout},"Sign Out"),
      e("button",{className:"btn sec sm",onClick:()=>runTestNotifications(aptId),
        title:"Insert test items with expiry/warranty dates to test banners",
        style:{fontSize:10,opacity:.6}
      },"🧪 Test")
    ),
    /* EXPIRY BANNER */
    e(NotificationBanner,{userId}),
    /* SEARCH BAR */
    e("div",{style:{display:"flex",gap:8,alignItems:"center",padding:"0 12px",marginBottom:8}},
      e(SearchBar,{aptId,onHighlight:(r)=>{
        if(!r.location){return;}
        // Switch to correct room
        const room=rooms.find(rm=>rm.dbId===r.location.room_id);
        if(room) setActiveRoom(room.localId);
        // Set highlights (furniture + specific shelf)
        setHighlightFurnDbId(r.location.furniture_id||null);
        setHighlightShelfDbId(r.location.shelf_id||null);
        // Find furniture in local state
        const allFurn=Object.values(furniture).flat();
        const found=allFurn.find(f=>f.dbId===r.location.furniture_id);
        if(found){
          setSelFurnId(found.localId);
          // Auto-open ShelfConstructor so highlighted shelf is immediately visible
          setModal({type:"constr",furn:found});
        }
        setTimeout(()=>{setHighlightShelfDbId(null);setHighlightFurnDbId(null);},6000);
      }}),
      e("button",{className:"btn sm",style:{whiteSpace:"nowrap"},
        onClick:()=>setModal("additem"),disabled:!aptId},
        "➕ Item")
    ),
    /* WORKSPACE */
    e("div",{className:"workspace"},
      /* SIDEBAR */
      e("div",{className:"sidebar"},
        e("div",{className:"sidebar-head"},e("div",{className:"sidebar-title"},"Rooms"),e("button",{className:"btn sm",style:{padding:"5px 10px"},disabled:!aptLocalName&&!aptId,title:(!aptLocalName&&!aptId)?"Create an apartment first":"Add room",onClick:()=>{if(!aptLocalName&&!aptId){alert("Create an apartment first (+ Apartment).");return;}setModal("room");}},"+")),
        e("div",{className:"room-list"},
          rooms.length===0&&e("div",{style:{color:"var(--text3)",fontSize:12,padding:"12px 8px"}},"Press + to add a room"),
          rooms.map(r=>e("button",{key:r.localId,className:"room-chip"+(activeRoom===r.localId?" active":""),onClick:async()=>{if(dirty&&(aptId||aptLocalName))await manualSave();setActiveRoom(r.localId);setSelFurnId(null);}},
            e("div",{className:"room-dot",style:{background:ROOM_COLORS[r.type]||"#94a3b8"}}),
            r.type,
            e("button",{className:"room-chip-del",onClick:ev=>{ev.stopPropagation();deleteRoom(r.localId);}},"✕")
          ))
        )
      ),
      /* CANVAS */
      e("div",{className:"canvas-wrap"},
        e("div",{className:"canvas-toolbar"},
          activeRoomData
            ? e(React.Fragment,null,
                e("div",{style:{width:9,height:9,borderRadius:"50%",background:rc,flexShrink:0}}),
                e("div",{className:"canvas-name"},activeRoomData.type),
                e("div",{style:{width:1,height:18,background:"var(--border)",margin:"0 6px"}}),
                e("span",{style:{fontSize:11,color:"var(--text3)"}},"Drag — move · 2× click — shelf constructor")
              )
            : e("span",{style:{fontSize:13,color:"var(--text3)"}},"Select a room"),
          e("div",{className:"spacer"}),
          activeRoom&&e("button",{className:"btn sm",onClick:()=>setModal("addfurn")},"+ Furniture")
        ),
        (!activeRoom||!activeRoomData)
          ? e("div",{className:"empty",style:{flex:1}},e("div",{className:"empty-icon"},"🏠"),e("div",{className:"empty-text"},activeRoom?"Loading...":"Select or create a room"))
          : e(RoomCanvas,{room:activeRoomData,furniture:roomFurn,selId:selFurnId,
              highlightFurnDbId,highlightShelfDbId,
              roomW:roomSizes[activeRoom]?.w||800,roomH:roomSizes[activeRoom]?.h||600,
              onResize:(w,h)=>{setRoomSizes(p=>({...p,[activeRoom]:{w,h}}));setDirty(true);},
              onSelect:id=>setSelFurnId(id),onUpdateFurn:updateFurn,
              onOpenConstructor:f=>setModal({type:"constr",furn:f})})
      ),
      /* RIGHT PANEL */
      e(RightPanel,{furn:selFurn,onChange:updateFurn,onDelete:deleteFurn,onOpenConstructor:f=>setModal({type:"constr",furn:f}),roomW:roomSizes[activeRoom]?.w||800,roomH:roomSizes[activeRoom]?.h||600})
    ),
    /* MODALS */
    modal==="apt"&&e(AddAptModal,{onClose:()=>setModal(null),onAdd:name=>{createApt(name);setModal(null);}}),
    modal==="additem"&&e(AddItemModal,{onClose:()=>setModal(null),aptId,
      onItemPlaced:(payload)=>{
        const {shelfDbId,furnDbId,itemType,itemName,expiryDate,warrantyDate}=payload||{};
        // Highlight the furniture and shelf where item was placed
        setHighlightShelfDbId(shelfDbId);
        setHighlightFurnDbId(furnDbId);

        // Update local state immediately (so no reload needed)
        setFurniture(prev=>{
          const next={...prev};
          for(const roomKey of Object.keys(next)){
            const arr=next[roomKey];
            const idx=arr.findIndex(f=>f.dbId===furnDbId);
            if(idx===-1) continue;
            const f=arr[idx];
            if(!f.shelfGrid) break;
            const newGrid=f.shelfGrid.map(row=>row.map(cell=>{
              if(cell.shelfDbId!==shelfDbId) return cell;
              const items=(cell.items||[]);
              const newItem={id:uid(),name:itemName||itemType?.name||"Item",item_type_id:itemType?.id||null,expiry:expiryDate||null,warranty:warrantyDate||null};
              return {...cell,items:[...items,newItem],itemId:(itemType?.id||cell.itemId||null)};
            }));
            const updated={...f,shelfGrid:newGrid};
            const newArr=[...arr]; newArr[idx]=updated;
            next[roomKey]=newArr;
            break;
          }
          return next;
        });

        // Switch to correct room + select the furniture
        const allFurn=Object.values(furniture).flat();
        const placedFurn=allFurn.find(f=>f.dbId===furnDbId);
        if(placedFurn){
          setActiveRoom(placedFurn.roomLocalId);
          setSelFurnId(placedFurn.localId);
        }

        // Clear highlight after 4 seconds
        setTimeout(()=>{setHighlightShelfDbId(null);setHighlightFurnDbId(null);},4000);
      }}),
    modal==="room"&&e(AddRoomModal,{onClose:()=>setModal(null),onAdd:async(type)=>{if(dirty&&(aptId||aptLocalName))await manualSave();addRoom(type);}}),
    modal==="addfurn"&&e(AddFurnModal,{onClose:()=>setModal(null),roomType:activeRoomData?.type||"",onAdd:f=>{addFurn(f);setModal(null);}}),
    constructorFurn&&e(ShelfConstructor,{furn:constructorFurn,onClose:()=>setModal(null),onChange:f=>{updateFurn(f);setModal(null);}})
  );
}

ReactDOM.render(e(App),document.getElementById("app"));
</script>
</body>
</html>
