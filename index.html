<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ApartmentOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#252538;
  --border:#2a2a42;--accent:#6366f1;--accent2:#ec4899;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --success:#10b981;--danger:#ef4444;
  --radius:10px;--font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow:hidden}
button{font-family:var(--font);cursor:pointer}
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 50%,#1e1b4b,#0a0a0f)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px;width:380px;display:flex;flex-direction:column;gap:20px}
.auth-title{font-size:26px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-sub{color:var(--text2);font-size:13px;margin-top:-12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;width:100%}
.input:focus{border-color:var(--accent)}
.btn{background:var(--accent);border:none;border-radius:var(--radius);padding:12px 18px;color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.sec{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.btn.danger{background:var(--danger)}.btn.sm{padding:6px 13px;font-size:12px}
.err{color:var(--danger);font-size:12px;background:#ef444415;border-radius:8px;padding:9px 12px}
.toggle-link{color:var(--text2);font-size:13px;text-align:center}
.toggle-link span{color:var(--accent);font-weight:600;cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.apt-sel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:12px;padding:7px 11px;outline:none;cursor:pointer;max-width:180px}
.spacer{flex:1}
.save-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--success);transition:background .3s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.save-dot.saving{animation:pulse 1s infinite}.save-dot.errr{background:var(--danger)}
.workspace{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;flex:1}
.room-list{flex:1;overflow-y:auto;padding:8px}
.room-list::-webkit-scrollbar{width:3px}
.room-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.room-chip{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text2);width:100%;text-align:left}
.room-chip:hover{background:var(--surface2)}.room-chip.active{background:var(--surface3);color:var(--text)}
.room-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.room-chip-del{margin-left:auto;opacity:0;font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px}
.room-chip:hover .room-chip-del{opacity:1}.room-chip-del:hover{color:var(--danger)}
.canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.canvas-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.canvas-name{font-size:13px;font-weight:700;color:var(--text2)}
#room-canvas{flex:1;position:relative;overflow:auto;background:var(--bg);cursor:default}
.canvas-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none}
.furn-node{position:absolute;border-radius:8px;cursor:grab;user-select:none;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;border:2px solid transparent;transition:border-color .15s,box-shadow .15s;font-size:11px;font-weight:700;text-align:center;overflow:hidden}
.furn-node:active{cursor:grabbing}
.furn-label{font-size:10px;font-weight:700;opacity:.9;padding:0 4px;line-height:1.2;pointer-events:none}
.furn-icon{font-size:22px;pointer-events:none;line-height:1}
.right-panel{width:295px;min-width:295px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rp-head{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.rp-title{font-size:14px;font-weight:700;flex:1}
.rp-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:13px}
.rp-body::-webkit-scrollbar{width:3px}
.rp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.form-row{display:flex;gap:7px}
.num-field{display:flex;flex-direction:column;gap:4px;flex:1}
.num-field label{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.z-group{display:flex;gap:5px}
.z-btn{flex:1;padding:8px 4px;border-radius:7px;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-size:10px;font-weight:700;font-family:var(--font);transition:all .15s;text-align:center}
.seg-btn{flex:1;padding:7px 3px;border-radius:7px;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;font-family:var(--font);transition:all .15s}
.seg-btn.on{border-color:var(--accent);background:#6366f118;color:var(--accent)}
.sep{height:1px;background:var(--border)}
.open-constructor-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;border:1.5px dashed var(--accent);background:#6366f108;color:var(--accent);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.open-constructor-btn:hover{background:#6366f118}
.modal-bg{position:fixed;inset:0;background:#000d;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 80px #000c;max-height:94vh;overflow:hidden}
.modal-sm{width:min(400px,95vw)}
.modal-lg{width:min(840px,96vw)}
.modal-title{font-size:17px;font-weight:800;flex-shrink:0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.constructor-body{display:flex;gap:14px;flex:1;overflow:hidden;min-height:0}
.constr-left{display:flex;flex-direction:column;gap:10px;width:210px;flex-shrink:0;overflow-y:auto}
.constr-left::-webkit-scrollbar{width:3px}
.constr-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.constr-canvas{flex:1;display:flex;flex-direction:column;overflow:hidden}
.shelf-visual{flex:1;border:2px solid var(--border);border-radius:10px;overflow:auto;background:var(--surface2);padding:8px;display:flex;flex-direction:column;gap:4px;min-height:260px}
.shelf-row-vis{display:flex;gap:4px;min-height:44px}
.shelf-cell{border-radius:6px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;padding:4px;transition:all .15s;position:relative;min-width:44px}
.shelf-cell:hover{border-color:var(--accent);background:#6366f110}
.shelf-cell.sel{border-color:var(--accent);background:#6366f118;box-shadow:0 0 0 2px #6366f130}
.shelf-cell-item{font-size:9px;font-weight:700;color:var(--accent2);text-align:center;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.shelf-cell-size{font-size:8px;color:var(--text3);font-family:var(--mono)}
.add-row-btn,.add-col-btn{background:none;border:1.5px dashed var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;transition:all .15s}
.add-row-btn{padding:5px;margin-left:20px;width:calc(100% - 20px)}
.add-row-btn:hover,.add-col-btn:hover{border-color:var(--accent);color:var(--accent);background:#6366f108}
.add-col-btn{padding:5px 10px;min-width:30px;align-self:stretch}
.cell-editor{background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
.cell-editor-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.item-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;width:100%}
.item-search:focus{border-color:var(--accent)}
.item-list{overflow-y:auto;max-height:200px;display:flex;flex-direction:column;gap:2px}
.item-list::-webkit-scrollbar{width:3px}
.item-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.item-row{padding:6px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:6px}
.item-row:hover{background:var(--surface2);color:var(--text)}.item-row.on{background:#6366f118;color:var(--accent)}
.item-tag{font-size:9px;font-family:var(--mono);background:var(--surface3);border-radius:3px;padding:1px 4px;color:var(--text3)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex:1;color:var(--text3);text-align:center;padding:40px}
.empty-icon{font-size:44px;opacity:.25}.empty-text{font-size:14px;font-weight:600}.empty-sub{font-size:12px;opacity:.6}
.furn-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ftype-btn{padding:8px 6px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;text-align:center}
.ftype-btn:hover{border-color:var(--accent);color:var(--accent);background:#6366f110}
.ftype-btn.on{border-color:var(--accent);background:#6366f118;color:var(--accent)}
.type-wrap{display:flex;flex-wrap:wrap;gap:5px}
.type-chip{padding:6px 11px;border-radius:7px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;font-family:var(--font);transition:all .15s}
.rot-group{display:flex;gap:4px}
.rot-btn{flex:1;padding:7px 0;border-radius:7px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;font-family:var(--font);transition:all .15s}
.rot-btn.on{border-color:var(--accent);background:#6366f118;color:var(--accent)}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;font-size:14px;transition:all .15s;line-height:1}
.icon-btn:hover{color:var(--text);background:var(--surface3)}.icon-btn.del:hover{color:var(--danger)}
.row-handle{display:flex;align-items:center;width:18px;flex-direction:column;justify-content:center;gap:1px;flex-shrink:0}
.row-lbl{font-size:8px;color:var(--text3);font-family:var(--mono)}

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes bounceIn {
  0%   { transform: translateX(-50%) scale(.7); opacity:0; }
  70%  { transform: translateX(-50%) scale(1.1); }
  100% { transform: translateX(-50%) scale(1); opacity:1; }
}
@keyframes pulse-highlight {
  0%,100% { box-shadow: 0 0 0 3px #fbbf2480, 0 0 24px #fbbf2460; }
  50%      { box-shadow: 0 0 0 6px #fbbf24cc, 0 0 40px #fbbf2490; }
}
</style>

<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const e=React.createElement;

/* ─── Supabase ─── */
const SB_URL="https://nfhtywzgedmpwkgfoopp.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5maHR5d3pnZWRtcHdrZ2Zvb3BwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDk2MDgsImV4cCI6MjA4NzAyNTYwOH0.bGIicmvQtYm3AQ_-muKNJa5gOaPTLtv-T_GqPVm9oR0";
const sb={
  getToken(){return localStorage.getItem("sb_t");},
  setSession(d){
    if(d.access_token)localStorage.setItem("sb_t",d.access_token);
    if(d.refresh_token)localStorage.setItem("sb_r",d.refresh_token);
  },
  clearSession(){localStorage.removeItem("sb_t");localStorage.removeItem("sb_r");},

  /* Refresh the access token using the stored refresh_token */
  async refresh(){
    const rt=localStorage.getItem("sb_r");
    if(!rt)throw new Error("No refresh token");
    const r=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{
      method:"POST",
      headers:{"Content-Type":"application/json",apikey:SB_KEY},
      body:JSON.stringify({refresh_token:rt})
    });
    const d=await r.json();
    if(!r.ok)throw d;
    this.setSession(d);
    return d.access_token;
  },

  /* Check if JWT is expired (with 60s buffer) */
  isExpired(){
    const t=this.getToken();
    if(!t)return true;
    try{
      const payload=JSON.parse(atob(t.split(".")[1]));
      return (payload.exp - 60) < Math.floor(Date.now()/1000);
    }catch{return true;}
  },

  /* Get valid token, refreshing if needed */
  async validToken(){
    if(this.isExpired()){
      try{return await this.refresh();}
      catch{this.clearSession();window.location.reload();return null;}
    }
    return this.getToken();
  },

  hdr(withPrefer){
    const h={"Content-Type":"application/json",apikey:SB_KEY};
    if(withPrefer)h["Prefer"]="return=representation";
    const t=this.getToken();
    if(t)h.Authorization="Bearer "+t;
    return h;
  },

  async q(path,method,body){
    await this.validToken(); // ensure fresh token before every request
    const r=await fetch(SB_URL+"/rest/v1/"+path,{method:method||"GET",headers:this.hdr(true),body:body?JSON.stringify(body):undefined});
    const txt=await r.text();const d=txt?JSON.parse(txt):null;if(!r.ok)throw d;return d;
  },

  async auth(email,pw,action){
    const r=await fetch(SB_URL+"/auth/v1/"+action,{method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},body:JSON.stringify({email,password:pw})});
    const d=await r.json();if(!r.ok)throw d;return d;
  }
};

/* ══════════════════════════════════════════════════════════════
   STORAGE FURNITURE — shelf containers.
   rooms:[] = suitable for any room.
══════════════════════════════════════════════════════════════ */
const STORAGE_GROUPS=[
  {
    key:"universal", label:"🔧 Universal", color:"#6366f1",
    items:[
      {type:"wardrobe",    icon:"🗄", label:"Wardrobe",              w:180,h:60,  color:"#ec4899"},
      {type:"cabinet",     icon:"🗃", label:"Cabinet",              w:80, h:60,  color:"#6366f1"},

const SHELF_TYPES=[

/* SIZE = logical filter and compatibility rule */
const SIZE_CLASSES=["tiny","small","medium","large","xl"];

/* Which item classes fit in a slot of given type and size */
const SIZE_CAPACITY={
  shelf:      {tiny:["tiny"],small:["tiny","small"],medium:["tiny","small","medium"],large:["tiny","small","medium","large"],xl:["tiny","small","medium","large","xl"]},
  drawer:     {tiny:["tiny"],small:["tiny","small"],medium:["tiny","small","medium"],large:["tiny","small","medium","large"]},
  hanger:     {small:["small"],medium:["small","medium"],large:["small","medium","large"],xl:["small","medium","large","xl"]},

  surface:    {tiny:["tiny"],small:["tiny","small"],medium:["tiny","small","medium"],large:["tiny","small","medium","large"],xl:["tiny","small","medium","large","xl"]},
  compartment:{tiny:["tiny"],small:["tiny","small"],medium:["tiny","small","medium"],large:["tiny","small","medium","large"]},
  rack:       {small:["small"],medium:["small","medium"],large:["small","medium","large"],xl:["small","medium","large","xl"]},

const Z_LEVELS=[

  {v:1,label:"Waist", icon:"🧥",color:"#8b5cf6"},
  {v:2,label:"Head",icon:"🎩",color:"#ec4899"}
];

const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+"_"+Math.random().toString(36).slice(2,7);

/* ══════════════════════════════════════════════════════════════

let ITEM_TYPES=[];

/* ─── Shelf Constructor ─── */
function ShelfConstructor({furn,onClose,onChange,highlightShelfDbId=null}){
  const init=furn.shelfGrid||[[{id:uid(),shelfType:"shelf",size:"medium",itemId:null,flex:2},{id:uid(),shelfType:"shelf",size:"medium",itemId:null,flex:2}],[{id:uid(),shelfType:"drawer",size:"medium",itemId:null,flex:1}]];
  const[grid,setGrid]=useState(init);
  const[sel,setSel]=useState(null);
  const[search,setSearch]=useState("");
  const selData=sel?grid[sel.row]?.[sel.col]:null;
  // Clear search when switching slots — useEffect, never during render
  const selKey=sel?sel.row+"-"+sel.col:null;
  useEffect(()=>{ setSearch(""); },[selKey]);
  const selShelfDef=selData?SHELF_TYPES.find(s=>s.type===selData.shelfType):null;
  const def=furnDef(furn.type);
  const zInfo=Z_LEVELS.find(z=>z.v===(furn.z??0));

  function addRow(){
    setGrid(g=>{
      const totalSlots=g.reduce((s,row)=>s+row.length,0);
      if(g.length>=20){alert("Maximum 20 shelf rows per furniture.");return g;}
      if(totalSlots>=20){alert("Maximum 20 total slots per furniture.");return g;}
      return [...g,[{id:uid(),shelfType:"shelf",size:"medium",itemId:null,flex:2}]];
    });
  }
  function removeRow(ri){if(grid.length<=1)return;setGrid(g=>g.filter((_,i)=>i!==ri));if(sel&&sel.row===ri)setSel(null);}
  function addCol(ri){setGrid(g=>g.map((row,i)=>i===ri?[...row,{id:uid(),shelfType:"shelf",size:"medium",itemId:null,flex:2}]:row));}
  function removeCol(ri,ci){if(grid[ri].length<=1)return;setGrid(g=>g.map((row,i)=>i===ri?row.filter((_,j)=>j!==ci):row));if(sel&&sel.row===ri&&sel.col===ci)setSel(null);}

  function updCell(ri,ci,patch){setGrid(g=>g.map((row,i)=>i===ri?row.map((c,j)=>j===ci?{...c,...patch}:c):row));}
  function assignItem(itemId){if(!sel)return;updCell(sel.row,sel.col,{itemId});}
  function clearItem(){if(!sel)return;updCell(sel.row,sel.col,{itemId:null});}
  function save(){onChange({...furn,shelfGrid:grid});onClose();}

  // Filter items by size compatibility — depend only on shelfType+size, not full selData
  const filtItems=useMemo(()=>{
    let items=ITEM_TYPES;
    if(selData){
      const allowed=SIZE_CAPACITY[selData.shelfType]?.[selData.size]||[];
      items=items.filter(it=>allowed.includes(it.tags.size));
    }
    const s=search.toLowerCase().trim();
    if(s) items=items.filter(it=>it.name.toLowerCase().includes(s)||(it.tags?.type||"").toString().toLowerCase().includes(s));
    return items;
  },[selData?.shelfType,selData?.size,search,ITEM_TYPES.length]);

  // Cell background by shelf type
  const cellBg={shelf:"#3b82f610",drawer:"#8b5cf610",hanger:"#f9731610",container:"#6366f110",
    surface:"#34d39910",compartment:"#ec489910",rack:"#64748b10",hidden:"#0f172a20"};
  const cellBorder={shelf:"#3b82f650",drawer:"#8b5cf650",hanger:"#f9731650",container:"#6366f150",
    surface:"#34d39950",compartment:"#ec489950",rack:"#64748b50",hidden:"#64748b50"};

  return e(Modal,{title:"Constructor: "+def.label,onClose,onConfirm:save,confirmLabel:"Save",size:"lg"},
    e("div",{style:{fontSize:11,color:"var(--text2)",marginTop:-8}},"Level: ",e("span",{style:{color:zInfo.color}},zInfo.icon+" "+zInfo.label)),
    e("div",{className:"constructor-body",style:{maxHeight:"62vh"}},

      /* ── LEFT: cell editor ── */
      e("div",{className:"constr-left"},
        selData ? e("div",{style:{display:"flex",flexDirection:"column",gap:10}},

          e("div",{className:"sec-label"},"Slot "+(sel.row+1)+"-"+(sel.col+1)),
            // Items actually placed into this shelf (from DB)
            (selData.items&&selData.items.length>0) ? e("div",{style:{background:"var(--surface3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 10px",display:"flex",flexDirection:"column",gap:6}},
              e("div",{style:{fontSize:10,fontWeight:800,color:"var(--text2)"}},`Items on this shelf: ${selData.items.length}`),
              e("div",{style:{display:"flex",flexDirection:"column",gap:4,maxHeight:120,overflowY:"auto"}},
                selData.items.slice().reverse().map(it=>e("div",{key:it.id||Math.random(),style:{fontSize:11,color:"var(--text)",display:"flex",justifyContent:"space-between",gap:8}},
                  e("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},it.name||("ID "+it.item_type_id)),
                  (it.expiry||it.warranty) ? e("span",{style:{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}},(it.expiry?("⏳ "+it.expiry):"")+(it.expiry&&it.warranty?" · ":"")+(it.warranty?("🛡 "+it.warranty):"")) : null
                ))
              )
            ) : null,


          // Shelf type selector
          e("div",{className:"field"},
            e("label",null,"Slot type"),
            e("div",{style:{display:"flex",flexDirection:"column",gap:3}},
              SHELF_TYPES.map(st=>e("button",{key:st.type,
                style:{display:"flex",alignItems:"center",gap:7,padding:"7px 10px",borderRadius:7,cursor:"pointer",textAlign:"left",
                  border:"1.5px solid "+(selData.shelfType===st.type?cellBorder[st.type]||"var(--accent)":"var(--border)"),
                  background:selData.shelfType===st.type?cellBg[st.type]||"#6366f110":"var(--surface2)",
                  color:selData.shelfType===st.type?"var(--text)":"var(--text2)",
                  fontSize:11,fontWeight:700,fontFamily:"var(--font)",transition:"all .15s"},
                onClick:()=>{
                  const validSizes=VALID_SIZES[st.type];
                  const newSize=validSizes.includes(selData.size)?selData.size:validSizes[Math.floor(validSizes.length/2)];
                  updCell(sel.row,sel.col,{shelfType:st.type,size:newSize,itemId:null});
                }
              },e("span",{style:{fontSize:14}},st.icon),e("span",{style:{flex:1}},st.label)))
            )
          ),

          // Size selector (only valid sizes for this shelf type)
          e("div",{className:"field"},
            e("label",null,"Capacity (slot size)"),
            e("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
              (VALID_SIZES[selData.shelfType]||SIZE_CLASSES).map(s=>e("button",{key:s,
                style:{flex:1,minWidth:36,padding:"6px 4px",borderRadius:6,cursor:"pointer",
                  border:"1.5px solid "+(selData.size===s?"var(--accent)":"var(--border)"),
                  background:selData.size===s?"#6366f120":"var(--surface2)",
                  color:selData.size===s?"var(--accent)":"var(--text2)",
                  fontSize:11,fontWeight:700,fontFamily:"var(--font)"},
                onClick:()=>updCell(sel.row,sel.col,{size:s,itemId:null})},s))
            ),
            // Capacity description
            e("div",{style:{fontSize:9,color:"var(--text3)",marginTop:3,lineHeight:1.5}},
              "Fits: "+(SIZE_CAPACITY[selData.shelfType]?.[selData.size]||[]).join(", ")||"—"
            )
          ),

          // Flex size
          e("div",{className:"field"},
            e("label",null,"Relative size (1–10)"),
            e("input",{className:"input",type:"number",min:1,max:10,value:selData.flex,
              style:{padding:"7px 10px",fontSize:13},onChange:x=>updCell(sel.row,sel.col,{flex:Math.max(1,Math.min(10,parseInt(x.target.value)||1))})})
          ),

          e("div",{className:"sep"}),

          // Item assignment
          selData.itemId&&e("button",{className:"btn sec sm",onClick:clearItem,style:{width:"100%"}},"✕ Clear type"),
          e("div",null,
              e("div",{style:{fontSize:10,color:"var(--text3)",marginBottom:5}},
                "Assign item type (",filtItems.length,"):"),
              e("input",{className:"item-search",placeholder:"Search...",maxLength:60,value:search,
                onChange:x=>setSearch(x.target.value.slice(0,60))}),
              filtItems.length===0
                ? e("div",{style:{fontSize:11,color:"var(--text3)",padding:"6px 0"}},
                    search?"No results for \""+search+"\"":selData.shelfType==="hanger"?"Only clothing can be stored here":"No items for this size"
                  )
                : e("div",{className:"item-list",style:{maxHeight:140}},
                    filtItems.slice(0,60).map(it=>e("div",{key:it.id,
                      className:"item-row"+(selData.itemId===it.id?" on":""),
                      onClick:()=>assignItem(it.id)},
                      e("span",{style:{flex:1,fontSize:11}},it.name),
                      e("span",{className:"item-tag"},it.tags.size)
                    ))
                  )
            )

        ) : e("div",{style:{color:"var(--text3)",fontSize:12,padding:"12px 0",lineHeight:1.7}},
            "← Click a slot to configure its type and capacity")
      ),

      /* ── RIGHT: visual grid ── */
      e("div",{className:"constr-canvas"},
        e("div",{className:"sec-label",style:{marginBottom:6,flexShrink:0}},
          "Furniture layout (rows = top to bottom · cells = left to right)"),
        e("div",{className:"shelf-visual"},
          grid.map((row,ri)=>e("div",{key:ri,className:"shelf-row-vis"},
            e("div",{className:"row-handle"},
              e("span",{className:"row-lbl"},"R"+(ri+1)),
              grid.length>1&&e("button",{className:"icon-btn del",style:{fontSize:10,padding:"1px 3px"},onClick:()=>removeRow(ri)},"✕")
            ),
            row.map((cell,ci)=>{
              const item=cell.itemId?ITEM_TYPES.find(x=>x.id===cell.itemId):null;
              const stDef=SHELF_TYPES.find(s=>s.type===cell.shelfType)||SHELF_TYPES[0];
              const isSel=sel&&sel.row===ri&&sel.col===ci;
              return e("div",{key:cell.id,
                className:"shelf-cell"+(isSel?" sel":""),
                style:{flex:cell.flex,minHeight:52,
                  background:highlightShelfDbId&&cell.shelfDbId===highlightShelfDbId?"#fbbf2430":
                    isSel?"#6366f118":cell.itemId?"var(--accent)0a":cellBg[cell.shelfType]||"var(--surface)",
                  borderColor:highlightShelfDbId&&cell.shelfDbId===highlightShelfDbId?"#fbbf24":
                    isSel?"var(--accent)":cellBorder[cell.shelfType]||"var(--border)",
                  boxShadow:highlightShelfDbId&&cell.shelfDbId===highlightShelfDbId?"0 0 0 2px #fbbf24":"none",
                  transition:"all .3s"},
                onClick:()=>setSel(isSel?null:{row:ri,col:ci})
              },
                e("span",{style:{fontSize:15,pointerEvents:"none"}},stDef.icon),
                e("span",{style:{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",pointerEvents:"none"}},cell.size),
                item&&e("div",{className:"shelf-cell-item",style:{
                  background:cell.shelfDbId?"#22c55e18":"var(--accent)15",
                  borderLeft:"2px solid "+(cell.shelfDbId?"#22c55e":"var(--accent)"),
                  display:"flex",justifyContent:"space-between",alignItems:"center",gap:4
                }},
                  e("span",null,(cell.shelfDbId?"📍 ":"📋 ")+(item.name.length>10?item.name.slice(0,8)+"…":item.name)),
                  cell.itemCount>0&&e("span",{style:{
                    background:"#22c55e",color:"white",borderRadius:"50%",
                    width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:9,fontWeight:800,flexShrink:0
                  }},cell.itemCount)
                ),
                e("span",{style:{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",pointerEvents:"none"}},"×"+cell.flex),
                row.length>1&&e("button",{
                  className:"icon-btn del",
                  style:{position:"absolute",top:2,right:2,fontSize:9,padding:"1px 3px",opacity:.4},

    return canAdd?"+ Add shelf (row) ("+rowsLeft+" left)":"✕ Shelf limit reached (20)";
  })()
)
        )
      )
    )
  );
}

/* ─── Add Furniture Modal ─── */
function AddFurnModal({onClose,onAdd,roomType}){
  const[tab,setTab]=useState("anchor");
  const[selType,setSelType]=useState(null);
  const[zv,setZv]=useState(0);

  const groups=tab==="anchor"?ANCHOR_GROUPS:STORAGE_GROUPS;

  // Show group if: universal, OR matches current room, OR roomType not set
  function shouldShow(groupKey){
    return groupKey==="universal"||!roomType||groupKey===roomType;
  }

  function confirm(){
    if(!selType)return;
    const def=furnDef(selType);
    onAdd({id:uid(),type:selType,category:tab==="anchor"?"anchor":"storage",
      x:80,y:80,z:zv,w:def.w,h:def.h,rotation:0,shelfGrid:null});
    onClose();
  }

  return e(Modal,{title:"Add Furniture",onClose,onConfirm:selType?confirm:null,confirmLabel:"Add",size:"sm"},
    // Tab switcher
    e("div",{style:{display:"flex",gap:4,background:"var(--surface2)",padding:3,borderRadius:8,border:"1px solid var(--border)"}},
      [["anchor","⚓ Anchors"],["storage","📦 Storage"]].map(([v,l])=>
        e("button",{key:v,style:{flex:1,padding:"7px 0",borderRadius:6,border:"none",cursor:"pointer",
          fontFamily:"var(--font)",fontSize:12,fontWeight:700,transition:"all .15s",
          background:tab===v?"var(--accent)":"transparent",color:tab===v?"white":"var(--text2)"},
          onClick:()=>{setTab(v);setSelType(null);}},l)
      )
    ),

    // Groups + items
    e("div",{style:{overflowY:"auto",maxHeight:"55vh",display:"flex",flexDirection:"column",gap:12}},
      groups.map(grp=>{
        if(!shouldShow(grp.key))return null;
        return e("div",{key:grp.key},

/* ─── Room Canvas ─── */
function RoomCanvas({room,furniture,selId,onSelect,onUpdateFurn,onOpenConstructor,roomW,roomH,onResize,highlightFurnDbId,highlightShelfDbId}){
  const canvasRef=useRef(null);
  const drag=useRef(null);
  const furnRef=useRef(furniture);
  useEffect(()=>{furnRef.current=furniture;},[furniture]);
  // Click-cycling through overlapping furniture (top -> bottom -> top ...)
  const cycleRef=useRef({key:"",idx:0,ids:[]});

  function pointInRoom(ev){
    const canvas=canvasRef.current;
    if(!canvas)return {x:ev.clientX,y:ev.clientY};
    const rect=canvas.getBoundingClientRect();
    return {
      x:(ev.clientX-rect.left)+canvas.scrollLeft,
      y:(ev.clientY-rect.top)+canvas.scrollTop
    };
  }

  function getBBox(f){
    const rot=f.rotation||0;
    const dispW=(rot===90||rot===270)?f.h:f.w;
    const dispH=(rot===90||rot===270)?f.w:f.h;
    // x,y is now CENTER of furniture
    return {l:f.x-dispW/2,t:f.y-dispH/2,r:f.x+dispW/2,b:f.y+dispH/2,dispW,dispH};
  }

  function hitsAtPoint(x,y){
    const hits=furnRef.current.filter(f=>{
      const bb=getBBox(f);
      return x>=bb.l && x<=bb.r && y>=bb.t && y<=bb.b;
    });
    // Order similarly to zIndex in render (higher zIndex = "top")
    hits.sort((a,b)=>{
      const za=(a.z??0), zb=(b.z??0);
      if(za!==zb) return zb-za; // top first
      // fallback: later objects feel "on top"
      return (furnRef.current.indexOf(b) - furnRef.current.indexOf(a));
    });
    return hits;
  }


  function onFurnMD(ev,fId){
    ev.stopPropagation();
    const p=pointInRoom(ev);
    const hits=hitsAtPoint(p.x,p.y);
    const clickedIds=hits.map(h=>h.localId);
    let pickId=fId;

    if(hits.length>1){
      const key=`${Math.round(p.x)}_${Math.round(p.y)}_${clickedIds.join(",")}`;
      if(cycleRef.current.key===key){
        cycleRef.current.idx=(cycleRef.current.idx+1)%hits.length;
      }else{
        cycleRef.current.key=key;
        // If current selection is under cursor, start cycling from it; else from top
        const curIdx=hits.findIndex(h=>h.localId===selId);
        cycleRef.current.idx=(curIdx>=0?(curIdx+1)%hits.length:0);
      }
      pickId=hits[cycleRef.current.idx].localId;
      // force selection immediately so UI shows which one you're dragging
      onSelect(pickId);
    }

    const f=furnRef.current.find(x=>x.localId===pickId);
    if(!f)return;
    drag.current={id:pickId,mx:ev.clientX,my:ev.clientY,fx:f.x,fy:f.y,moved:false};
    window.addEventListener('mousemove',onMM);
    window.addEventListener('mouseup',onMU);
  }
  function onMM(ev){
    if(!drag.current)return;
    const{id,mx,my,fx,fy}=drag.current;
    const dx=ev.clientX-mx,dy=ev.clientY-my;
    if(!drag.current.moved&&Math.abs(dx)<5&&Math.abs(dy)<5)return;
    drag.current.moved=true;
    const f=furnRef.current.find(x=>x.localId===id);
    if(!f)return;
    const rot=f.rotation||0;
    const dispW=(rot===90||rot===270)?f.h:f.w;
    const dispH=(rot===90||rot===270)?f.w:f.h;
    // clamp by room size (roomW/roomH), not viewport rect
    const nx=clamp(snap(fx+dx),dispW/2,Math.max(dispW/2,(roomW||800)-dispW/2));
    const ny=clamp(snap(fy+dy),dispH/2,Math.max(dispH/2,(roomH||600)-dispH/2));
    onUpdateFurn({...f,x:nx,y:ny});
  }
  function onMU(){
    if(drag.current&&!drag.current.moved){onSelect(drag.current.id);}
    drag.current=null;
    window.removeEventListener('mousemove',onMM);
    window.removeEventListener('mouseup',onMU);
  }
  function onCanvasMD(ev){if(ev.target===canvasRef.current||ev.target.className==='canvas-grid')onSelect(null);}
  useEffect(()=>()=>{window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);},[]);

  // Resize drag
  const resizeDrag=useRef(null);
  function onResizeMD(ev){
    ev.stopPropagation();
    resizeDrag.current={mx:ev.clientX,my:ev.clientY,w:roomW,h:roomH};
    window.addEventListener('mousemove',onRMM);window.addEventListener('mouseup',onRMU);
  }
  function onRMM(ev){
    if(!resizeDrag.current)return;
    const{mx,my,w,h}=resizeDrag.current;
    onResize(Math.max(300,snap(w+ev.clientX-mx)),Math.max(200,snap(h+ev.clientY-my)));
  }
  function onRMU(){resizeDrag.current=null;window.removeEventListener('mousemove',onRMM);window.removeEventListener('mouseup',onRMU);}

  const rc=ROOM_COLORS[room.type]||'#94a3b8';
  return e('div',{id:'room-canvas',ref:canvasRef,onMouseDown:onCanvasMD,style:{position:'relative',flex:1,overflow:'auto',background:'var(--bg)'}},
    e('div',{className:'canvas-grid',style:{position:'absolute',left:0,top:0,width:roomW,height:roomH,minWidth:'100%',minHeight:'100%'}}),
    e('div',{style:{position:'absolute',left:0,top:0,width:roomW,height:roomH,border:'2px solid '+rc+'45',borderRadius:12,pointerEvents:'none',background:rc+'05',boxShadow:'inset 0 0 80px '+rc+'08'}}),
    e('div',{style:{position:'absolute',top:8,left:12,fontSize:10,color:rc+'80',fontFamily:'var(--mono)',pointerEvents:'none'}},roomW+'×'+roomH),
    e('div',{style:{position:'absolute',left:roomW-14,top:roomH-14,width:16,height:16,cursor:'se-resize',background:rc+'60',borderRadius:'4px 0 8px 0',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center'},onMouseDown:onResizeMD,title:'Resize room'},
      e('span',{style:{fontSize:9,color:'white',pointerEvents:'none',lineHeight:1}},'⤡')),
    furniture.map(f=>{
      const def=furnDef(f.type);
      const zInfo=Z_LEVELS.find(z=>z.v===(f.z??0));
      const isSel=selId===f.localId;
      const rot=f.rotation||0;
      const dispW=(rot===90||rot===270)?f.h:f.w;
      const dispH=(rot===90||rot===270)?f.w:f.h;
      const isStorage=isFurnStorage(f);
      let filled=0,total=0;
      if(f.shelfGrid){f.shelfGrid.forEach(row=>{total+=row.length;row.forEach(c=>{if(c.itemId)filled++;});});}
      return e("div",{key:f.localId,
        className:"furn-node"+(isSel?" selected":""),
        style:{left:f.x-dispW/2,top:f.y-dispH/2,width:dispW,height:dispH,
          background:isStorage?def.color+"18":def.color+"0e",
          borderColor:isSel?def.color:highlightFurnDbId&&f.dbId===highlightFurnDbId?"#fbbf24":isStorage?def.color+"55":def.color+"80",
          borderStyle:isStorage?"solid":"dashed",
          boxShadow:isSel?"0 0 0 3px "+def.color+"40,0 4px 20px "+def.color+"28":
            highlightFurnDbId&&f.dbId===highlightFurnDbId?"0 0 0 5px #fbbf24,0 0 40px #fbbf2499,0 0 80px #fbbf2444":"0 2px 8px #0004",
          zIndex: 10 + ((f.z??0) * 100) + (isSel ? 50 : 0) + (highlightFurnDbId&&f.dbId===highlightFurnDbId ? 200 : 0),
          transition:"box-shadow .3s,border-color .3s",
          animation:highlightFurnDbId&&f.dbId===highlightFurnDbId?"pulse-highlight 1s ease-in-out 3":"none",
        },
        onMouseDown:ev=>onFurnMD(ev,f.localId),
        onDoubleClick:ev=>{ev.stopPropagation();if(isStorage)onOpenConstructor(f);}
      },
        /* Highlight banner — shown above furniture when item found here */
        highlightFurnDbId&&f.dbId===highlightFurnDbId&&e("div",{style:{
          position:"absolute",top:-28,left:"50%",transform:"translateX(-50%)",
          background:"#fbbf24",color:"#1a1a1a",
          padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:800,
          whiteSpace:"nowrap",pointerEvents:"none",zIndex:20,
          boxShadow:"0 2px 8px #0006",animation:"bounceIn .3s ease"
        }},"📍 ITEM HERE"),
        e("div",{style:{
          display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",gap:2,pointerEvents:"none",width:"100%",height:"100%"
        }},
          e("span",{className:"furn-icon"},def.icon),
          e("span",{className:"furn-label",style:{color:def.color}},def.label),
          e("span",{style:{fontSize:9,color:zInfo.color,fontFamily:"var(--mono)"}},zInfo.icon)
        ),
        isStorage&&total>0&&e("span",{style:{position:"absolute",top:3,right:3,fontSize:8,fontFamily:"var(--mono)",background:def.color+"30",color:def.color,borderRadius:4,padding:"1px 4px"}},""+filled+"/"+total),
        isStorage&&e("span",{style:{position:"absolute",top:3,left:3,fontSize:8,color:def.color+"80",fontFamily:"var(--mono)"}},"2x✎")
      );
    })
  );
}

/* ─── NumInput: stable number input that only commits on blur/Enter ─── */
function NumInput({value,onChange,min,max,style}){
  const[raw,setRaw]=useState(String(value??0));
  const[focused,setFocused]=useState(false);
  // Sync from outside only when not focused
  useEffect(()=>{ if(!focused) setRaw(String(value??0)); },[value,focused]);
  function commit(str){
    let n=parseFloat(str.replace(",","."));
    if(isNaN(n)) n=value??min??0;
    if(min!=null) n=Math.max(min,n);
    if(max!=null) n=Math.min(max,n);
    // Hard cap: never allow values that would crash layout
    n=Math.min(n,9999);
    n=Math.max(n,-(9999));
    setRaw(String(n));
    if(n!==value) onChange(n);
  }
  return e("input",{
    className:"input",type:"text",inputMode:"numeric",
    value:raw,
    maxLength:6,
    style:{padding:"7px 10px",fontSize:13,...(style||{})},
    onFocus:()=>setFocused(true),
    onChange:ev=>{
      // Only allow digits, dot, comma, minus
      const v=ev.target.value.replace(/[^0-9.,-]/g,"");
      if(v.length<=6) setRaw(v);
    },
    onBlur:ev=>{setFocused(false);commit(ev.target.value);},
    onKeyDown:ev=>{if(ev.key==="Enter")commit(ev.target.value);}
  });
}

function daysUntil(dateStr){
  if(!dateStr)return 999;

/* ─── Fuzzy search for item types ─── */
function lev(a,b){
  const m=a.length,n=b.length;
  if(Math.abs(m-n)>3)return 99;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function searchItemTypes(query){
  if(!query||query.length<1)return[];
  const words=query.toLowerCase().split(/\s+/).filter(w=>w.length>=2);
  if(!words.length)return[];

  const scored=ITEM_TYPES.map(it=>{
    const nameParts=it.name.toLowerCase().split(" ");
    const type=(it.tags.type||"").toLowerCase();
    let score=0;
    for(const w of words){
      const nameStr=it.name.toLowerCase();
      if(nameStr.includes(w))                score+=10; // exact substring
      else if(nameParts.some(p=>p.startsWith(w))) score+=6; // word-start
      else{
        // Fuzzy: levenshtein against each word in name
        const minDist=Math.min(...nameParts.map(p=>lev(w,p)));
        if(minDist<=1&&w.length>=4)          score+=5; // 1 typo
        else if(minDist<=2&&w.length>=5)     score+=2; // 2 typos
      }
      if(type.includes(w))                   score+=3;
    }
    return {it,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);

  return scored.slice(0,8).map(x=>x.it);
}

/* ─── Gemini match: викликає Edge Function яка використовує Gemini API ─── */
async function geminiMatchItem(userText){
  // Layer 1: try Edge Function (Gemini AI — handles typos, other languages, descriptions)
  try{
    const tok = await sb.validToken();
    const res = await fetch(SB_URL+"/functions/v1/match-item",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"x-user-token":tok||""},
      body:JSON.stringify({query:userText})
    });
    const d = await res.json();
    if(!res.ok){
      // Show specific error to help debug
      const code=d.code||"";
      if(code==="NO_KEY") console.warn("⚠️ Gemini: GEMINI_API_KEY не встановлений в Supabase Secrets");
      else if(code==="NO_ITEMS") console.warn("⚠️ Gemini: таблиця items порожня — запусти seed_items.sql");
      else if(code==="GEMINI_ERROR") console.warn("⚠️ Gemini API помилка:", d.error);
      else console.warn("⚠️ match-item 500:", d.error);
      throw new Error(d.code||d.error||"500");
    }
    if(d.ids && d.ids.length>0){
      const mapped=d.ids.map(id=>ITEM_TYPES.find(it=>it.id===id)).filter(Boolean);
      console.log("✨ Gemini IDs:", d.ids, "| знайдено тегів:", mapped.length, "| теги:", mapped.map(x=>x.name));
      if(mapped.length>0) return {results:mapped, source:"gemini"};
      console.warn("✨ Gemini IDs не співпали з жодним типом в БД:", d.ids);
    } else {
      console.log("✨ Gemini повернув порожній масив []");
    }
  }catch(ex){
    console.warn("Gemini Edge Function failed, using local search:", ex.message);
  }
  // Layer 2: local fuzzy search (always works, no network needed)
  const local = searchItemTypes(userText);
  return {results:local, source:"local"};
}
